<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game 2 — Federalists vs Anti-Federalists</title>
<link rel="stylesheet" href="../styles.css">
</head>

<body>
<div class="wrap">
<a class="back-link" href="../index.html">← Back to Hub</a>

<header class="hero">
<div class="kicker">Legend Mastery Series • American Government</div>
<h1>Game 2 — Federalists vs Anti-Federalists</h1>
<p class="sub">Passage-based mastery. Identify arguments, fears, and support for ratification.</p>

<div class="pills">
<span class="pill">30 Questions</span>
<span class="pill">Passage-Based</span>
<span class="pill">Auto-advance</span>
<span class="pill">Hint on miss</span>
<span class="pill">100% required</span>
</div>
</header>

<div id="app"></div>
</div>

<script>
const QUESTIONS = [

{ passage:"The proposed Constitution creates a strong central government that will maintain order.",
stem:"This reflects which group?",
choices:["Anti-Federalists","Federalists","States","Local governments"],
answer:1,
hint:"Support strong national government.",
explain:"Federalists supported a stronger central government."},

{ passage:"The Constitution lacks protections for individual rights.",
stem:"Who argued this?",
choices:["Federalists","Judges","Anti-Federalists","Governors"],
answer:2,
hint:"Think Bill of Rights.",
explain:"Anti-Federalists wanted protections added."},

{ passage:"A large republic prevents factions from dominating.",
stem:"This supports which side?",
choices:["Anti-Federalists","Federalists","Local leaders","Citizens"],
answer:1,
hint:"Federalist No. 10 idea.",
explain:"Federalists argued large republic = stability."},

{ passage:"Power should remain with states.",
stem:"This reflects",
choices:["Federalists","Anti-Federalists","Courts","Congress"],
answer:1,
hint:"Fear of central government.",
explain:"Anti-Federalists favored states."},

{ passage:"Separation of powers prevents tyranny.",
stem:"This supports",
choices:["Anti-Federalists","Federalists","Local gov","Judges"],
answer:1,
hint:"Trust in system.",
explain:"Federalists trusted structure."},

{ passage:"Strong executive could become a king.",
stem:"This concern is from",
choices:["Federalists","Anti-Federalists","Courts","Senate"],
answer:1,
hint:"Fear of president power.",
explain:"Anti-Federalists feared monarchy."},

{ passage:"National government should regulate trade.",
stem:"Federalists saw this as",
choices:["Weakness","Strength","Unnecessary","Illegal"],
answer:1,
hint:"Fixing Articles problems.",
explain:"Federalists wanted economic unity."},

{ passage:"Without rights listed, freedoms are at risk.",
stem:"This reflects",
choices:["Federalists","Anti-Federalists","States","Judges"],
answer:1,
hint:"Bill of Rights issue.",
explain:"Anti-Federalists demanded protections."},

{ passage:"Government power is divided between state and national.",
stem:"This concept is",
choices:["Federalism","Democracy","Judicial review","Liberty"],
answer:0,
hint:"Power split.",
explain:"Federalism divides power."},

{ passage:"National defense requires strong central authority.",
stem:"Supports",
choices:["Anti-Federalists","Federalists","States","Local gov"],
answer:1,
hint:"Think army.",
explain:"Federalists supported national defense."},

{ passage:"Small republics protect liberty better.",
stem:"This supports",
choices:["Federalists","Anti-Federalists","Courts","Congress"],
answer:1,
hint:"Small government preference.",
explain:"Anti-Federalists preferred small republics."},

{ passage:"Checks and balances protect freedom.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","Citizens","States"],
answer:0,
hint:"Trust system.",
explain:"Federalists supported structure."},

{ passage:"Bill of Rights must be added.",
stem:"This reflects",
choices:["Federalists","Anti-Federalists","Courts","Judges"],
answer:1,
hint:"Rights demand.",
explain:"Anti-Federalists insisted on protections."},

{ passage:"National government too weak under Articles.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","States","Judges"],
answer:0,
hint:"Fix weakness.",
explain:"Federalists wanted stronger gov."},

{ passage:"Central power threatens liberty.",
stem:"This is",
choices:["Federalist view","Anti-Federalist view","Judicial view","State view"],
answer:1,
hint:"Fear argument.",
explain:"Anti-Federalists feared tyranny."},

{ passage:"Large republic dilutes factions.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","States","Courts"],
answer:0,
hint:"Federalist 10 again.",
explain:"Federalists supported size."},

{ passage:"People need explicit rights protections.",
stem:"Who argued this?",
choices:["Federalists","Anti-Federalists","Congress","Courts"],
answer:1,
hint:"Bill of Rights.",
explain:"Anti-Federalists demanded it."},

{ passage:"Strong union prevents conflict between states.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","Local gov","Judges"],
answer:0,
hint:"National unity.",
explain:"Federalists wanted unity."},

{ passage:"Executive power must be limited.",
stem:"This reflects",
choices:["Federalists","Anti-Federalists","Courts","States"],
answer:1,
hint:"Fear executive.",
explain:"Anti-Federalists feared president."},

{ passage:"Constitution balances power effectively.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","Local gov","Citizens"],
answer:0,
hint:"Trust system.",
explain:"Federalists supported design."},

{ passage:"Government should be closer to people.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","Courts","Senate"],
answer:1,
hint:"Local control.",
explain:"Anti-Federalists favored local power."},

{ passage:"National government ensures stability.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","States","Courts"],
answer:0,
hint:"Strong gov.",
explain:"Federalists valued stability."},

{ passage:"Rights must be protected explicitly.",
stem:"Reflects",
choices:["Federalists","Anti-Federalists","Judges","Congress"],
answer:1,
hint:"Rights concern.",
explain:"Anti-Federalists wanted Bill of Rights."},

{ passage:"Checks prevent abuse of power.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","States","Citizens"],
answer:0,
hint:"Structure trust.",
explain:"Federalists trusted system."},

{ passage:"Large government removes citizen voice.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","Courts","Senate"],
answer:1,
hint:"Fear size.",
explain:"Anti-Federalists feared distance."},

{ passage:"Stronger central authority needed.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","States","Courts"],
answer:0,
hint:"Fix Articles.",
explain:"Federalists wanted stronger gov."},

{ passage:"Liberty is safer in small systems.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","Courts","Congress"],
answer:1,
hint:"Small gov.",
explain:"Anti-Federalists preferred small scale."},

{ passage:"Constitution creates balance.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","Citizens","States"],
answer:0,
hint:"System design.",
explain:"Federalists supported structure."},

{ passage:"Government must not overpower citizens.",
stem:"Reflects",
choices:["Federalists","Anti-Federalists","Courts","Judges"],
answer:1,
hint:"Fear power.",
explain:"Anti-Federalists feared abuse."},

{ passage:"National unity requires strong government.",
stem:"Supports",
choices:["Federalists","Anti-Federalists","States","Courts"],
answer:0,
hint:"Unity argument.",
explain:"Federalists supported unity."}

];

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

let current=0, attempts=0, correct=0, startTime, timer;

function startGame(){
startTime=Date.now();
timer=setInterval(()=>{
document.getElementById("time").textContent =
Math.floor((Date.now()-startTime)/1000)+"s";
},1000);
render();
}

function render(){
const q=QUESTIONS[current];

document.getElementById("app").innerHTML=`
<div class="question-card">
<div class="passage">${q.passage}</div>
<div class="stem">${q.stem}</div>

<div class="choices">
${shuffle(q.choices).map((c,i)=>`<button class="choice" onclick="submit('${c}')">${c}</button>`).join("")}
</div>

<div class="small">Time: <span id="time">0s</span></div>
</div>`;
}

function submit(choice){
const q=QUESTIONS[current];
attempts++;

if(choice===q.choices[q.answer]){
correct++;
setTimeout(next,5000);
}else{
alert(q.hint);
}
}

function next(){
current++;
if(current>=QUESTIONS.length){
endGame();
}else{
render();
}
}

function endGame(){
clearInterval(timer);
document.getElementById("app").innerHTML=`
<div class="ticket">
<h2>Submission Ticket</h2>
<p>Score: ${correct}/30</p>
<p>Attempts: ${attempts}</p>
</div>`;
}

document.getElementById("app").innerHTML=`
<div class="start-card">
<h2>Enter Name</h2>
<input id="name">
<button class="btn" onclick="startGame()">Start</button>
</div>`;
</script>

</body>
</html>
