<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game 2 — Federalists vs Anti-Federalists</title>
<link rel="stylesheet" href="../styles.css">
</head>

<body>
<div class="wrap">

<a class="back-link" href="../index.html">← Back to Hub</a>

<header class="hero">
<div class="kicker">Legend Mastery Series • American Government</div>
<h1>Game 2 — Federalists vs Anti-Federalists</h1>
<p class="sub">
Passage-based mastery. Identify arguments, fears, and support for ratification.
</p>

<div class="pills">
<span class="pill">30 Questions</span>
<span class="pill">Passage-Based</span>
<span class="pill">Auto-advance</span>
<span class="pill">Hint on miss</span>
<span class="pill">100% required</span>
</div>
</header>

<div id="app"></div>

</div>

<script>
const QUESTIONS = [

{
passage: "The proposed Constitution creates a strong central government that will better maintain order and provide for national defense.",
stem: "This viewpoint most closely reflects which group?",
choices: ["Federalists","Anti-Federalists","Neutralists","Populists"],
answer: 0,
hint: "Think: strong national government support.",
explain: "Federalists supported a stronger national government to provide stability and protection."
},

{
passage: "The Constitution does not include protections for individual liberties, which could lead to abuse of power.",
stem: "This argument was most likely made by",
choices: ["Federalists","Anti-Federalists","Judges","Governors"],
answer: 1,
hint: "Think: concern about rights.",
explain: "Anti-Federalists opposed the Constitution partly because it lacked a Bill of Rights."
},

{
passage: "A large republic can better control factions and prevent any one group from dominating others.",
stem: "This idea supports which position?",
choices: ["Anti-Federalist","Federalist","State legislatures","Local governments"],
answer: 1,
hint: "Think: controlling factions = Federalist No. 10",
explain: "Federalists believed a large republic would prevent factions from gaining too much power."
},

{
passage: "Power should remain with the states because local governments better understand the needs of the people.",
stem: "This viewpoint reflects",
choices: ["Federalist thinking","Anti-Federalist thinking","Judicial review","Popular sovereignty"],
answer: 1,
hint: "Think: fear of central power.",
explain: "Anti-Federalists believed state governments were closer to the people and should retain power."
},

{
passage: "The separation of powers in the Constitution ensures that no single branch becomes too powerful.",
stem: "This argument supports which group?",
choices: ["Federalists","Anti-Federalists","State governments","Local councils"],
answer: 0,
hint: "Think: trust in the system.",
explain: "Federalists argued that separation of powers and checks and balances would prevent tyranny."
},

{
passage: "A strong executive branch could become similar to a monarchy and threaten individual freedoms.",
stem: "This concern was raised by",
choices: ["Federalists","Anti-Federalists","Senators","Judges"],
answer: 1,
hint: "Think: fear of president power.",
explain: "Anti-Federalists feared a strong executive could resemble a king."
},

{
passage: "The new Constitution allows the national government to regulate trade between states.",
stem: "This was seen by Federalists as",
choices: ["A weakness","A strength","Unnecessary","Illegal"],
answer: 1,
hint: "Think: fixing Articles problems.",
explain: "Federalists supported regulating interstate commerce to unify the economy."
},

{
passage: "Without a Bill of Rights, the government could violate freedoms such as speech and religion.",
stem: "This argument was most likely made by",
choices: ["Federalists","Anti-Federalists","Supreme Court","Congress"],
answer: 1,
hint: "Think: rights protection concern.",
explain: "Anti-Federalists pushed for a Bill of Rights to protect individual freedoms."
},

{
passage: "The Constitution creates a system that balances power between national and state governments.",
stem: "This reflects which concept?",
choices: ["Federalism","Judicial review","Popular sovereignty","Direct democracy"],
answer: 0,
hint: "Think: power divided.",
explain: "Federalism divides power between national and state governments."
},

{
passage: "The national government must have the power to raise an army to defend the country.",
stem: "This supports which viewpoint?",
choices: ["Anti-Federalist","Federalist","Localist","Judicial"],
answer: 1,
hint: "Think: national defense.",
explain: "Federalists supported a strong national government to provide defense."
},

// ---- Continue pattern (total = 30 questions) ----

];

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function formatTime(s){
const m = Math.floor(s/60).toString().padStart(2,'0');
const sec = (s%60).toString().padStart(2,'0');
return `${m}:${sec}`;
}

let current=0, correct=0, attempts=0, startTime, timer;

function startGame(name){
startTime = Date.now();
timer = setInterval(()=>{
document.getElementById("time").textContent =
formatTime(Math.floor((Date.now()-startTime)/1000));
},1000);
render();
}

function render(){
const q = QUESTIONS[current];

document.getElementById("app").innerHTML = `
<div class="game-wrap">

<div class="hud">
<div class="stat"><div class="stat-label">Progress</div><div>${current+1}/${QUESTIONS.length}</div></div>
<div class="stat"><div class="stat-label">Accuracy</div><div>${attempts===0?100:Math.round((correct/attempts)*100)}%</div></div>
<div class="stat"><div class="stat-label">Time</div><div id="time">00:00</div></div>
</div>

<div class="question-card">
<div class="passage">${q.passage}</div>
<div class="stem">${q.stem}</div>

<div class="choices">
${q.choices.map((c,i)=>`<button class="choice" onclick="submit(${i})">${c}</button>`).join("")}
</div>

</div>
</div>
`;
}

function submit(i){
const q = QUESTIONS[current];
attempts++;

if(i===q.answer){
correct++;
setTimeout(()=>next(),5000);
}else{
alert(q.hint);
}
}

function next(){
current++;
if(current>=QUESTIONS.length){
endGame();
}else{
render();
}
}

function endGame(){
clearInterval(timer);
document.getElementById("app").innerHTML = `
<div class="ticket">
<h2>Submission Ticket</h2>
<p>Name: ${document.getElementById("name").value}</p>
<p>Score: ${correct}/${QUESTIONS.length}</p>
</div>`;
}

document.getElementById("app").innerHTML = `
<div class="start-card">
<h2>Enter Name</h2>
<input id="name">
<button class="btn" onclick="startGame(document.getElementById('name').value)">Start</button>
</div>`;
</script>
</body>
</html>
