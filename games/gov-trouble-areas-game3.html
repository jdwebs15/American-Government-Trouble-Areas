function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(seconds){
  const h = Math.floor(seconds / 3600).toString().padStart(2,"0");
  const m = Math.floor((seconds % 3600) / 60).toString().padStart(2,"0");
  const s = Math.floor(seconds % 60).toString().padStart(2,"0");
  return `${h}:${m}:${s}`;
}

function formatStamp(d){
  return d.toLocaleString();
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

const APP = document.getElementById("app");

let studentName = "";
let startedAt = null;
let timer = null;
let elapsed = 0;

let questions = [];
let current = 0;
let misses = 0;
let attempts = 0;
let locked = false;
let awaitingCorrection = false;

function buildQuestionBank(){
  return QUESTIONS.map((q, idx) => {
    const order = shuffle(q.choices.map((choice, i) => ({ choice, originalIndex: i })));
    const remappedChoices = order.map(x => x.choice);
    const newCorrect = order.findIndex(x => x.originalIndex === q.correct);
    return { ...q, id: idx + 1, choices: remappedChoices, correct: newCorrect };
  });
}

function startScreen(){
  APP.innerHTML = `
    <div class="start-card">
      <h2>Enter your name to begin</h2>
      <p>
        Mastery rules: auto-advance on correct, hint on miss, and you must correct missed items before moving forward.
      </p>
      <input id="studentName" type="text" placeholder="Enter your name to begin" autocomplete="off" />
      <button class="btn" id="startBtn">Start Game</button>
      <hr class="sep">
      <p class="note">Your ticket will show name, date, start time, runtime, accuracy, attempts, and result.</p>
    </div>
  `;

  document.getElementById("startBtn").addEventListener("click", () => {
    const name = document.getElementById("studentName").value.trim();
    if(!name){
      alert("Please enter your name before starting.");
      return;
    }
    studentName = name;
    startedAt = new Date();
    elapsed = 0;
    current = 0;
    misses = 0;
    attempts = 0;
    locked = false;
    awaitingCorrection = false;
    questions = buildQuestionBank();

    if(timer) clearInterval(timer);
    timer = setInterval(() => {
      elapsed++;
      const rt = document.getElementById("runtime");
      if(rt) rt.textContent = formatTime(elapsed);
    }, 1000);

    renderQuestion();
  });
}

function renderQuestion(feedbackHtml = ""){
  const q = questions[current];
  const progressPct = Math.round((current / questions.length) * 100);
  const accuracy = attempts === 0 ? 100 : Math.round(((attempts - misses) / attempts) * 100);

  APP.innerHTML = `
    <div class="game-wrap">
      <div class="hud">
        <div class="stat">
          <div class="stat-label">Progress</div>
          <div class="stat-value">${current + 1} / ${questions.length}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Accuracy</div>
          <div class="stat-value">${accuracy}%</div>
        </div>
        <div class="stat">
          <div class="stat-label">Attempts</div>
          <div class="stat-value">${attempts}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Runtime</div>
          <div class="stat-value" id="runtime">${formatTime(elapsed)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Started</div>
          <div class="stat-value">${formatStamp(startedAt)}</div>
        </div>
      </div>

      <div class="progress">
        <div class="progress-bar" style="width:${progressPct}%"></div>
      </div>

      <div class="question-card">
        <div class="q-meta">Question ${current + 1} of ${questions.length}</div>
        <div class="passage">${escapeHtml(q.passage)}</div>
        <div class="stem">${escapeHtml(q.stem)}</div>

        <div class="choices" id="choices"></div>

        ${feedbackHtml}

        <div class="controls">
          <button class="btn secondary" id="restartBtn">Restart</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById("restartBtn").addEventListener("click", hardRestart);

  const choicesEl = document.getElementById("choices");
  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `<strong>${String.fromCharCode(65 + i)}.</strong> ${escapeHtml(choice)}`;
    btn.addEventListener("click", () => submitSingle(i));
    choicesEl.appendChild(btn);
  });
}

function submitSingle(selected){
  if(locked) return;
  locked = true;
  attempts++;

  const q = questions[current];
  const correct = selected === q.correct;

  if(correct){
    const feedback = `
      <div class="feedback good">
        <span class="label">Correct</span>
        ${escapeHtml(q.explain)}
      </div>
    `;
    renderQuestion(feedback);
    setTimeout(nextQuestion, 5000);
  } else {
    misses++;
    awaitingCorrection = true;
    const feedback = `
      <div class="feedback bad">
        <span class="label">Not yet</span>
        ${escapeHtml(q.hint)}
      </div>
    `;
    renderQuestion(feedback);
    const choiceButtons = [...document.querySelectorAll(".choice")];
    choiceButtons.forEach((btn, idx) => {
      btn.addEventListener("click", () => retrySingle(idx));
    });
  }
}

function retrySingle(selected){
  if(!awaitingCorrection) return;
  const q = questions[current];
  if(selected === q.correct){
    awaitingCorrection = false;
    locked = true;
    const feedback = `
      <div class="feedback good">
        <span class="label">Corrected</span>
        ${escapeHtml(q.explain)}
      </div>
    `;
    renderQuestion(feedback);
    setTimeout(nextQuestion, 5000);
  } else {
    const feedback = `
      <div class="feedback bad">
        <span class="label">Try again</span>
        ${escapeHtml(q.hint)}
      </div>
    `;
    renderQuestion(feedback);
    const choiceButtons = [...document.querySelectorAll(".choice")];
    choiceButtons.forEach((btn, idx) => {
      btn.addEventListener("click", () => retrySingle(idx));
    });
  }
}

function nextQuestion(){
  locked = false;
  awaitingCorrection = false;
  current++;
  if(current >= questions.length){
    finishGame();
  } else {
    renderQuestion();
  }
}

function finishGame(){
  clearInterval(timer);
  const finishedAt = new Date();
  const accuracy = attempts === 0 ? 100 : Math.round(((attempts - misses) / attempts) * 100);
  const passed = misses === 0 ? "MASTERED" : "REPLAY";

  APP.innerHTML = `
    <div class="ticket">
      <h2>Submission Ticket</h2>
      <p class="sub">Turn this in to show completion.</p>

      <div class="ticket-grid">
        <div class="ticket-item">
          <div class="label">Name</div>
          <div class="value">${escapeHtml(studentName)}</div>
        </div>
        <div class="ticket-item">
          <div class="label">Date</div>
          <div class="value">${finishedAt.toLocaleDateString()}</div>
        </div>
        <div class="ticket-item">
          <div class="label">Started</div>
          <div class="value">${formatStamp(startedAt)}</div>
        </div>
        <div class="ticket-item">
          <div class="label">Finished</div>
          <div class="value">${formatStamp(finishedAt)}</div>
        </div>
        <div class="ticket-item">
          <div class="label">Runtime</div>
          <div class="value">${formatTime(elapsed)}</div>
        </div>
        <div class="ticket-item">
          <div class="label">Accuracy</div>
          <div class="value">${accuracy}%</div>
        </div>
        <div class="ticket-item">
          <div class="label">Attempts</div>
          <div class="value">${attempts}</div>
        </div>
        <div class="ticket-item">
          <div class="label">Result</div>
          <div class="value">${passed}</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="playAgain">Play Again</button>
        <a class="btn secondary" href="../index.html">Back to Hub</a>
      </div>
    </div>
  `;

  document.getElementById("playAgain").addEventListener("click", hardRestart);
}

function hardRestart(){
  if(timer) clearInterval(timer);
  studentName = "";
  startedAt = null;
  elapsed = 0;
  current = 0;
  misses = 0;
  attempts = 0;
  locked = false;
  awaitingCorrection = false;
  startScreen();
}

startScreen();
</script>
